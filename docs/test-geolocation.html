<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation</title>
</head>
<body>
    <div class="container">
        <h1>Your Geolocation</h1>

        <button onclick="startTracking()">Start Tracking</button>

        <div class="info">
            <div class="label">Latitude</div>
            <div class="value" id="latitude">-</div>
        </div>

        <div class="info">
            <div class="label">Longitude</div>
            <div class="value" id="heading">-</div>
        </div>

        <div class="info">
            <div class="label">Heading (Orientation)</div>
            <div class="value" id="heading">-</div>
        </div>

        <div class="info">
            <div class="label">Instant Speed</div>
            <div class="value" id="instant-speed">-</div>
        </div>

        <div class="info">
            <div class="label">Average Speed</div>
            <div class="value" id="average-speed">-</div>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script src="geolocation.js"></script>
</body>
</html>
