<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console de contrôle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='control.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='leaflet.css') }}"/>
    <script src="{{ url_for('static', filename='leaflet.js')}}"></script>
</head>
<body>
    <header class="top-bar">
        <h1>Console de Contrôle</h1>
        <nav>
            <a href="/">Retour à la page principale</a>
        </nav>
    </header>

    <section class="right-panel">
        <h2>Database</h2>
        <div class="control-area">

            <div class="db-block">
                <h3>Add Vélo</h3>
                {% if err == 'invalidModele' %}
                    <p style="color:red;">Modèle déjà existant</p>
                {% endif %}
                <form method="POST" class="add-form">
                    <input type="text" name="modele" placeholder="Nouveau modèle" required>
                    <button type="submit">Ajouter</button>
                </form>
                <div class="db-block" style="border: 2px solid red;">
                    <h3 style="color:red;">Danger Zone</h3>
                    <form method="POST" action="/reset_db" onsubmit="return confirm('Supprimer toute la base de données ? Cette action est irréversible.')">
                        <button type="submit" style="background:red; color:white;"> Réinitialiser la base de données</button>
                    </form>
                </div>
            </div>

            <!-- VELOS -->
            <div class="db-block">
                <h3>Vélos</h3>
                <table id="velosTable"></table>
            </div>

            <!-- PARCOURS — each row has a "Voir points" button -->
            <div class="db-block">
                <h3>Parcours</h3>
                <table id="parcoursTable"></table>
            </div>

            <!-- POINTS DETAIL — shown when a parcours is selected -->
            <div class="db-block" id="pointsBlock" style="display:none;">
                <h3>Points du parcours <span id="selectedParcours"></span>
                    <button onclick="closePoints()" style="float:right; font-size:0.8em;">✕ Fermer</button>
                </h3>
                <p id="pointsCount"></p>
                <table id="pointsTable"></table>
            </div>

            <div id="map">
                <script>
                    var map = L.map('map').setView([51.505, -0.09], 13);
                    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        maxZoom: 19,
                        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                    }).addTo(map);
                </script>
            </div>
        </div>
    </section>

    <script src="{{ url_for('static', filename='db_refresh.js') }}"></script>
</body>
</html>
